<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동산교회</title>
<meta name="theme-color" content="#1A2340">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#FAF7F0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:white;border-radius:16px;padding:40px;text-align:center;max-width:400px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.08);border:1px solid rgba(201,168,76,0.25)}
.cross{font-size:36px;color:#C9A84C;margin-bottom:12px}
h1{font-family:'Noto Serif KR',serif;font-size:24px;color:#1A2340;margin-bottom:4px}
.sub{font-size:12px;color:#8888AA;margin-bottom:24px}
.btn{display:block;padding:14px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:700;margin-bottom:10px;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn-member{background:linear-gradient(135deg,#C9A84C,#E8D5A0);color:#1A2340}
.btn-admin{background:linear-gradient(135deg,#1A2340,#2E3D70);color:white}
.info{font-size:10px;color:#8888AA;margin-top:20px;line-height:1.8}
</style>
</head>
<body>
<div class="card">
  <div class="cross">&#10013;</div>
  <h1>동산감리교회</h1>
  <div class="sub">기독교대한감리회 &middot; 강원도 태백시</div>
  <a href="index.html" class="btn btn-member">&#9962; 교인용 앱</a>
  <a href="admin.html" class="btn btn-admin">&#128274; 관리자 앱</a>
  <div class="info">
    주소: 강원도 태백시 계산4길 25<br>
    주일예배: 오전 9:00 / 11:00<br>
    수요예배: 저녁 7:30 &middot; 금요기도: 저녁 9:00
  </div>
</div>
</body>
</html>
